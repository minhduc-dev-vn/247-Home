AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  247 Home Terraform remote-state foundation. This stack is intentionally
  separate from Terraform so backend creation never requires local tfstate.

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - staging
      - production
  StateBucketName:
    Type: String
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]+[a-z0-9]$'
  AccessLogBucketName:
    Type: String
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]+[a-z0-9]$'
  LockTableName:
    Type: String
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '^[A-Za-z0-9_.-]+$'
  TerraformPrincipalArn:
    Type: String
    AllowedPattern: '^arn:aws[a-z-]*:iam::[0-9]{12}:role/.+$'
    Description: Approved Identity Center or workload role allowed to manage state.

Resources:
  StateKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub '247 Home ${Environment} Terraform state encryption'
      EnableKeyRotation: true
      PendingWindowInDays: 30
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: PermitApprovedTerraformPrincipal
            Effect: Allow
            Principal:
              AWS: !Ref TerraformPrincipalArn
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
              - kms:ReEncryptFrom
              - kms:ReEncryptTo
            Resource: '*'
      Tags:
        - Key: Project
          Value: 247-home
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormationBootstrap

  StateKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/247-home-${Environment}-terraform-state'
      TargetKeyId: !Ref StateKey

  AccessLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref AccessLogBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldAccessLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Project
          Value: 247-home
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormationBootstrap

  StateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: AccessLogBucketPolicy
    Properties:
      BucketName: !Ref StateBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              KMSMasterKeyID: !GetAtt StateKey.Arn
              SSEAlgorithm: aws:kms
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: !Sub 'state-access/${Environment}/'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: RetainStateHistory
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 365
      Tags:
        - Key: Project
          Value: 247-home
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormationBootstrap

  AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AccessLogBucket.Arn
              - !Sub '${AccessLogBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          - Sid: AllowStateBucketAccessLogging
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AccessLogBucket.Arn}/state-access/${Environment}/*'
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${StateBucketName}'
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  StateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StateBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt StateBucket.Arn
              - !Sub '${StateBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          - Sid: PermitApprovedPrincipalBucketMetadata
            Effect: Allow
            Principal:
              AWS: !Ref TerraformPrincipalArn
            Action:
              - s3:GetBucketLocation
              - s3:ListBucket
            Resource: !GetAtt StateBucket.Arn
          - Sid: PermitApprovedPrincipalStateObjects
            Effect: Allow
            Principal:
              AWS: !Ref TerraformPrincipalArn
            Action:
              - s3:DeleteObject
              - s3:GetObject
              - s3:PutObject
            Resource: !Sub '${StateBucket.Arn}/247-home/${Environment}/*'

  LockTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref LockTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        KMSMasterKeyId: !GetAtt StateKey.Arn
        SSEEnabled: true
        SSEType: KMS
      ResourcePolicy:
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: PermitApprovedTerraformPrincipal
              Effect: Allow
              Principal:
                AWS: !Ref TerraformPrincipalArn
              Action:
                - dynamodb:DeleteItem
                - dynamodb:DescribeTable
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${LockTableName}'
      Tags:
        - Key: Project
          Value: 247-home
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormationBootstrap

Outputs:
  StateBucketName:
    Value: !Ref StateBucket
  StateBucketKmsKeyArn:
    Value: !GetAtt StateKey.Arn
  AccessLogBucketName:
    Value: !Ref AccessLogBucket
  LockTableName:
    Value: !Ref LockTable
