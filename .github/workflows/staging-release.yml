name: Staging release

on:
  push:
    tags:
      - 'v*-staging*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing immutable staging Git tag
        required: true
        type: string
      deploy_staging:
        description: Snapshot, migrate, deploy exact digests, and validate staging
        required: true
        default: false
        type: boolean

concurrency:
  group: staging-release-${{ github.event.inputs.release_ref || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 11.16.0
  RELEASE_REF: ${{ github.event.inputs.release_ref || github.ref_name }}

jobs:
  quality:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: home247_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d home247_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/home247_test?schema=public
      NEXTAUTH_SECRET: test-only-auth-secret-at-least-thirty-two-characters
      NEXTAUTH_URL: http://127.0.0.1:3000
    steps:
      - name: Check out immutable release ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Require a staging tag
        shell: bash
        run: |
          case "$RELEASE_REF" in
            v*-staging*) ;;
            *) echo "release_ref must be an existing v*-staging* tag" >&2; exit 1 ;;
          esac
          test "$(git tag --points-at HEAD | grep -Fx "$RELEASE_REF")" = "$RELEASE_REF"
      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm audit:prod
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm test:migration
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build

  artifacts:
    needs: quality
    runs-on: ubuntu-24.04
    environment: staging
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
    outputs:
      migration_image: ${{ steps.publish.outputs.migration_image }}
      migration_digest: ${{ steps.publish.outputs.migration_digest }}
      runtime_image: ${{ steps.publish.outputs.runtime_image }}
      runtime_digest: ${{ steps.publish.outputs.runtime_digest }}
    steps:
      - name: Check out immutable release ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Resolve source identity
        id: source
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "created=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
      - name: Require reviewed AWS bindings
        shell: bash
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$ECR_REPOSITORY_URL"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@b040164c4934333d597f3f9c67502ff28f814e9c # v2.1.6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build runtime artifact
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: runtime
          load: true
          push: false
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.RELEASE_REF }}-runtime
          build-args: |
            APP_VERSION=${{ env.RELEASE_REF }}
            BUILD_TIMESTAMP=${{ steps.source.outputs.created }}
            GIT_SHA=${{ steps.source.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build migration artifact
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: migration
          load: true
          push: false
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.RELEASE_REF }}-migration
          cache-from: type=gha
      - name: Scan runtime image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY_URL }}:${{ env.RELEASE_REF }}-runtime
          version: v0.70.0
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Scan migration image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY_URL }}:${{ env.RELEASE_REF }}-migration
          skip-setup-trivy: true
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Generate runtime SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY_URL }}:${{ env.RELEASE_REF }}-runtime
          skip-setup-trivy: true
          format: cyclonedx
          output: runtime-sbom.cdx.json
          exit-code: '0'
      - name: Generate migration SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY_URL }}:${{ env.RELEASE_REF }}-migration
          skip-setup-trivy: true
          format: cyclonedx
          output: migration-sbom.cdx.json
          exit-code: '0'
      - name: Publish immutable artifacts
        id: publish
        shell: bash
        run: |
          runtime_tag="${ECR_REPOSITORY_URL}:${RELEASE_REF}-runtime"
          migration_tag="${ECR_REPOSITORY_URL}:${RELEASE_REF}-migration"
          docker push "$runtime_tag"
          docker push "$migration_tag"
          runtime_repo_digest="$(docker image inspect "$runtime_tag" --format '{{index .RepoDigests 0}}')"
          migration_repo_digest="$(docker image inspect "$migration_tag" --format '{{index .RepoDigests 0}}')"
          case "$runtime_repo_digest" in "$ECR_REPOSITORY_URL@sha256:"*) ;; *) exit 1 ;; esac
          case "$migration_repo_digest" in "$ECR_REPOSITORY_URL@sha256:"*) ;; *) exit 1 ;; esac
          echo "runtime_image=$runtime_repo_digest" >> "$GITHUB_OUTPUT"
          echo "runtime_digest=${runtime_repo_digest##*@}" >> "$GITHUB_OUTPUT"
          echo "migration_image=$migration_repo_digest" >> "$GITHUB_OUTPUT"
          echo "migration_digest=${migration_repo_digest##*@}" >> "$GITHUB_OUTPUT"
      - name: Attest runtime provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.ECR_REPOSITORY_URL }}
          subject-digest: ${{ steps.publish.outputs.runtime_digest }}
          push-to-registry: true
      - name: Attest runtime SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.ECR_REPOSITORY_URL }}
          subject-digest: ${{ steps.publish.outputs.runtime_digest }}
          sbom-path: runtime-sbom.cdx.json
          push-to-registry: true
      - name: Attest migration provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.ECR_REPOSITORY_URL }}
          subject-digest: ${{ steps.publish.outputs.migration_digest }}
          push-to-registry: true
      - name: Attest migration SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.ECR_REPOSITORY_URL }}
          subject-digest: ${{ steps.publish.outputs.migration_digest }}
          sbom-path: migration-sbom.cdx.json
          push-to-registry: true
      - name: Record artifact identity
        shell: bash
        run: |
          {
            echo "release_ref=$RELEASE_REF"
            echo "git_sha=$(git rev-parse HEAD)"
            echo "runtime_image=${{ steps.publish.outputs.runtime_image }}"
            echo "migration_image=${{ steps.publish.outputs.migration_image }}"
          } | tee artifact-manifest.txt
      - name: Upload artifact evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: staging-artifacts-${{ github.run_id }}
          path: |
            artifact-manifest.txt
            runtime-sbom.cdx.json
            migration-sbom.cdx.json
          retention-days: 30

  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_staging
    needs: artifacts
    runs-on: ubuntu-24.04
    environment: staging
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      DEPLOY_IMAGE: ${{ needs.artifacts.outputs.runtime_image }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      MIGRATION_IMAGE: ${{ needs.artifacts.outputs.migration_image }}
      MIGRATION_SECURITY_GROUP_ID: ${{ vars.MIGRATION_SECURITY_GROUP_ID }}
      MIGRATION_SUBNET_IDS: ${{ vars.MIGRATION_SUBNET_IDS }}
      MIGRATION_TASK_DEFINITION: ${{ vars.MIGRATION_TASK_DEFINITION }}
      RDS_INSTANCE_IDENTIFIER: ${{ vars.RDS_INSTANCE_IDENTIFIER }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      STAGING_ORIGIN_URL: ${{ vars.STAGING_ORIGIN_URL }}
    steps:
      - name: Check out immutable release ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Require staging bindings
        shell: bash
        run: |
          for value in AWS_REGION AWS_ROLE_ARN DEPLOY_IMAGE ECS_CLUSTER ECS_SERVICE \
            MIGRATION_IMAGE MIGRATION_SECURITY_GROUP_ID MIGRATION_SUBNET_IDS \
            MIGRATION_TASK_DEFINITION RDS_INSTANCE_IDENTIFIER STAGING_BASE_URL; do
            test -n "${!value}"
          done
          case "$STAGING_BASE_URL" in https://*) ;; *) exit 1 ;; esac
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create and wait for pre-migration snapshot
        id: snapshot
        shell: pwsh
        run: >-
          ./scripts/create-rds-pre-migration-snapshot.ps1
          -DbInstanceIdentifier $env:RDS_INSTANCE_IDENTIFIER
          -ReleaseRef $env:RELEASE_REF
      - name: Register exact migration image digest
        id: migration_task
        shell: bash
        run: ./scripts/register-ecs-migration-task.sh
      - name: Apply forward-only migrations in the private network
        shell: pwsh
        env:
          REGISTERED_MIGRATION_TASK: ${{ steps.migration_task.outputs.task_definition_arn }}
        run: >-
          ./scripts/run-ecs-migration-task.ps1
          -Cluster $env:ECS_CLUSTER
          -TaskDefinition $env:REGISTERED_MIGRATION_TASK
          -SubnetIds ($env:MIGRATION_SUBNET_IDS -split ',')
          -SecurityGroupId $env:MIGRATION_SECURITY_GROUP_ID
      - name: Verify database invariants in the private network
        shell: pwsh
        env:
          REGISTERED_MIGRATION_TASK: ${{ steps.migration_task.outputs.task_definition_arn }}
        run: >-
          ./scripts/run-ecs-migration-task.ps1
          -Cluster $env:ECS_CLUSTER
          -TaskDefinition $env:REGISTERED_MIGRATION_TASK
          -SubnetIds ($env:MIGRATION_SUBNET_IDS -split ',')
          -SecurityGroupId $env:MIGRATION_SECURITY_GROUP_ID
          -Command @('node','node_modules/tsx/dist/cli.mjs','scripts/verify-database-invariants.ts')
      - name: Deploy exact runtime image digest
        id: runtime
        shell: bash
        run: ./scripts/deploy-ecs-runtime.sh
      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Validate deployed HTTPS staging
        run: pnpm test:e2e:staging
      - name: Validate shared edge rate limit
        run: pnpm verify:staging-rate-limit
      - name: Record deployment evidence
        if: always()
        shell: bash
        run: |
          {
            echo "release_ref=$RELEASE_REF"
            echo "git_sha=$(git rev-parse HEAD)"
            echo "runtime_image=$DEPLOY_IMAGE"
            echo "migration_image=$MIGRATION_IMAGE"
            echo "snapshot_id=${{ steps.snapshot.outputs.snapshot_id }}"
            echo "runtime_task_definition=${{ steps.runtime.outputs.task_definition_arn }}"
            echo "migration_task_definition=${{ steps.migration_task.outputs.task_definition_arn }}"
            echo "workflow_run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } | tee deployment-evidence.txt
      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: staging-deployment-evidence-${{ github.run_id }}
          path: |
            deployment-evidence.txt
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 30
